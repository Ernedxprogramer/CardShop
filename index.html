<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Tienda de Cartas Pokémon</title>

    <!-- Estilos simples -->
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:0; padding:0;
            background:#f4f4f4;
        }
        header{
            background:#ff3333;
            color:#fff;
            text-align:center;
            padding:1rem 0;
            font-size:1.5rem;
        }
        .container{
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap:1rem;
            padding:1rem;
        }
        .card{
            background:#fff;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,.1);
            overflow:hidden;
            display:flex;
            flex-direction:column;
            transition:transform .2s;
        }
        .card:hover{transform:scale(1.02);}
        .card img{
            width:100%;
            height:260px;
            object-fit:cover;
        }
        .content{
            padding:1rem;
            flex:1;
        }
        .content h3{margin:0 0 .5rem;}
        .price{
            color:#ff3333;
            font-weight:bold;
            margin-bottom:.5rem;
        }
        .description{font-size:.9rem; color:#555;}
        .btn{
            text-align:center;
            padding:.5rem 0;
            background:#ff3333;
            color:#fff;
            text-decoration:none;
            font-weight:bold;
        }
        .btn:hover{background:#e60000;}
    </style>
</head>

<body>
    <header>¡Compra tu carta Pokémon favorita!</header>

    <div class="container" id="cards"></div>

    <script>
        /* -------------------------------------------
           1. Datos de las cartas (puedes añadir tantas como quieras)
           ------------------------------------------- */
        const cartas = [
            {
                nombre: "Charizard",
                precio: "$20",
                descripcion: "¡La legendaria carta de fuego!",
                img: "https://via.placeholder.com/260x260?text=Charizard"
            },
            {
                nombre: "Bulbasaur",
                precio: "$5",
                descripcion: "La primera de la generación 1.",
                img: "https://via.placeholder.com/260x260?text=Bulbasaur"
            },
            {
                nombre: "Pikachu",
                precio: "$10",
                descripcion: "Tu compañero eléctrico favorito.",
                img: "https://via.placeholder.com/260x260?text=Pikachu"
            }
            // Añade más cartas aquí
        ];

        /* -------------------------------------------
           2. Renderizado de las cartas
           ------------------------------------------- */
        const contenedor = document.getElementById("cards");

        cartas.forEach(carta => {
            const el = document.createElement("div");
            el.className = "card";
            el.innerHTML = `
                <img src="${carta.img}" alt="${carta.nombre}">
                <div class="content">
                    <h3>${carta.nombre}</h3>
                    <div class="price">${carta.precio}</div>
                    <div class="description">${carta.descripcion}</div>
                </div>
                <a class="btn" 
                   href="https://wa.me/5351664840?text=${encodeURIComponent('Hola, me gustaría comprar la carta '+carta.nombre)}"
                   target="_blank">
                   Contactar en WhatsApp
                </a>
            `;
            contenedor.appendChild(el);
        });
    </script>
</body>
</html>
